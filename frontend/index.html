<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electricity Bill Extractor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .header-title {
            font-weight: 600;
            color: #f1f5f9;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .main-card {
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .upload-box {
            border: 2px dashed rgba(148, 163, 184, 0.3);
            border-radius: 14px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.5);
        }

        .upload-box:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.08);
        }

        .form-control {
            background-color: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
        }

        .form-control::file-selector-button {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
        }

        .btn-custom:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            color: white;
        }

        .btn-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .key {
            color: #cbd5f5;
        }

        .value {
            color: #22d3ee;
        }

        .success {
            color: #22c55e;
            font-weight: 500;
        }

        .failed {
            color: #ef4444;
            font-weight: 500;
        }

        .warning-text {
            color: #facc15;
            font-weight: 500;
        }

        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-hover-bg: rgba(99,102,241,0.1);
        }

        .small-note {
            color: #94a3b8;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="header-title">⚡ Electricity Bill Extractor</h2>
        <p class="subtitle">Upload bills and extract structured data instantly</p>
    </div>

    <!-- UPLOAD -->
    <div class="card main-card p-4 shadow-sm">

        <div class="mb-3 upload-box">
            <label class="form-label">📄 Upload Bill(s)</label>
            <input type="file" class="form-control" id="fileInput" multiple accept=".png,.jpg,.jpeg,.pdf,.heic">
        </div>

        <div class="mb-3 upload-box">
            <label class="form-label">📁 OR Select Folder</label>
            <input type="file" class="form-control" id="folderInput" multiple webkitdirectory directory>
            <div class="small-note mt-2">Folder upload works best in Chrome/Edge.</div>
        </div>

        <button id="extractBtn" class="btn btn-custom w-100" onclick="upload()">
            🚀 Extract Data
        </button>
    </div>

    <!-- RESULTS -->
    <div id="resultBox" class="mt-4"></div>

</div>

<script>
const BASE_URL = "https://bill-extractor-ve47.onrender.com";

async function upload() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const resultBox = document.getElementById("resultBox");
    const extractBtn = document.getElementById("extractBtn");

    let formData = new FormData();

    if (folderInput.files.length > 0) {
        resultBox.innerHTML = `
            <div class="result-card p-3">
                ⏳ Processing folder... Render server may take time if it was sleeping.
            </div>
        `;

        for (let file of folderInput.files) {
            formData.append("files", file);
        }

    } else if (fileInput.files.length > 0) {
        resultBox.innerHTML = `
            <div class="result-card p-3">
                ⏳ Processing files... Please wait.
            </div>
        `;

        for (let file of fileInput.files) {
            formData.append("files", file);
        }

    } else {
        resultBox.innerHTML = `
            <div class="result-card p-3 failed">
                ❌ Please select at least one file or folder.
            </div>
        `;
        return;
    }

    try {
        extractBtn.disabled = true;
        extractBtn.innerText = "⏳ Extracting...";

        const response = await fetch(`${BASE_URL}/extract-bill`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();
        resultBox.innerHTML = formatResult(data);

    } catch (err) {
        console.error(err);

        resultBox.innerHTML = `
            <div class="result-card p-3 failed">
                ❌ Backend error or Render server is sleeping. Please try again after a few seconds.
            </div>
        `;

    } finally {
        extractBtn.disabled = false;
        extractBtn.innerText = "🚀 Extract Data";
    }
}


function downloadCSV() {
    const url = `${BASE_URL}/download-csv`;

    const a = document.createElement("a");
    a.href = url;
    a.download = "all_bills.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}


async function checkCSVExistsAndDownload() {
    try {
        const response = await fetch(`${BASE_URL}/download-csv`, {
            method: "GET"
        });

        if (!response.ok) {
            alert("CSV not found. Please extract bills first.");
            return;
        }

        const blob = await response.blob();
        const downloadUrl = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = "all_bills.csv";
        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(downloadUrl);

    } catch (error) {
        console.error(error);
        alert("Unable to download CSV. Please check if backend is running.");
    }
}


function formatResult(response) {
    let successCount = response.results.filter(item => item.status === "success").length;
    let failedCount = response.results.filter(item => item.status === "failed").length;

    let html = `
        <div class="result-card p-3 mb-3">
            <h6>📊 Summary</h6>

            <div class="d-flex justify-content-between">
                <span class="key">Status</span>
                <span class="${response.status === 'completed' ? 'success' : 'failed'}">
                    ${response.status}
                </span>
            </div>

            <div class="d-flex justify-content-between">
                <span class="key">Total Files</span>
                <span class="value">${response.total_files}</span>
            </div>

            <div class="d-flex justify-content-between">
                <span class="key">Successful</span>
                <span class="success">${successCount}</span>
            </div>

            <div class="d-flex justify-content-between">
                <span class="key">Failed</span>
                <span class="${failedCount > 0 ? 'failed' : 'success'}">${failedCount}</span>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-custom" onclick="checkCSVExistsAndDownload()">
                    📥 Download CSV
                </button>
            </div>

            <div class="small-note text-center mt-2">
                CSV is generated only after at least one bill is successfully extracted.
            </div>
        </div>

        <div class="result-card p-3">
            <h6>📄 Extracted Bills</h6>

            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>File</th>
                            <th>Status</th>
                            <th>Consumer ID</th>
                            <th>Name</th>
                            <th>Billing Date</th>
                            <th>Units</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Error</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

    response.results.forEach((item, i) => {
        const d = item.data || {};

        let errorMessage = "-";

        if (item.error) {
            if (typeof item.error === "string") {
                errorMessage = item.error;
            } else {
                errorMessage = item.error.error || "Extraction failed";
            }
        }

        html += `
            <tr>
                <td>${i + 1}</td>
                <td>${item.file || "-"}</td>
                <td class="${item.status === 'success' ? 'success' : 'failed'}">
                    ${item.status}
                </td>
                <td>${d.consumer_id || "-"}</td>
                <td>${d.name || "-"}</td>
                <td>${d.billing_date || "-"}</td>
                <td>${d.units || "-"}</td>
                <td>${d.amount || "-"}</td>
                <td>${d.due_date || "-"}</td>
                <td class="${item.status === 'failed' ? 'failed' : ''}">
                    ${errorMessage}
                </td>
            </tr>
        `;
    });

    html += `
                    </tbody>
                </table>
            </div>
        </div>
    `;

    return html;
}
</script>

</body>
</html>
