<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Extractor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
        }

        .card {
            background-color: #ffffff;
            color: #000;
            border-radius: 15px;
        }

        h2 {
            font-weight: bold;
        }

        .btn-primary {
            background-color: #2a5298;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1e3c72;
        }

        #resultBox {
            background-color: #0f172a;
            color: #38bdf8;
            border-radius: 10px;
            font-size: 14px;
        }

        label {
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">⚡ Electricity Bill Extractor</h2>

    <div class="card p-4 shadow-lg">

        <!-- File Upload -->
        <div class="mb-3">
            <label class="form-label">Upload Bill(s)</label>
            <input type="file" class="form-control" id="files" multiple>
        </div>

        <!-- Folder Path -->
        <div class="mb-3">
            <label class="form-label">OR Enter Folder Path</label>
            <input type="text" class="form-control" id="folderPath" placeholder="C:\Users\...\bills">
        </div>

        <!-- Submit -->
        <button class="btn btn-primary w-100" onclick="upload()">Extract Data</button>

    </div>

    <!-- Results -->
    <div class="mt-4">
        <h5>Results:</h5>
        <pre id="resultBox" class="p-3 shadow" style="min-height:150px;"></pre>
    </div>

</div>

<script>
async function upload() {
    const filesInput = document.getElementById("files");
    const folderPath = document.getElementById("folderPath").value;
    const resultBox = document.getElementById("resultBox");

    resultBox.innerText = "Processing... ⏳";

    let formData = new FormData();

    if (filesInput.files.length > 0) {
        for (let i = 0; i < filesInput.files.length; i++) {
            formData.append("files", filesInput.files[i]);
        }
    }

    if (folderPath) {
        formData.append("folder_path", folderPath);
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/extract-bill", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        resultBox.innerText = JSON.stringify(data, null, 2);

    } catch (error) {
        resultBox.innerText = "Error: " + error;
    }
}
</script>

</body>
</html>
