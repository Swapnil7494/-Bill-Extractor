<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Extractor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e6f9f0, #ffffff);
            color: #064e3b;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            border: 1px solid #bbf7d0;
        }

        h2 {
            font-weight: bold;
            color: #047857;
        }

        .btn-primary {
            background-color: #16a34a;
            border: none;
        }

        .btn-primary:hover {
            background-color: #15803d;
        }

        #resultBox {
            background-color: #ecfdf5;
            color: #065f46;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #bbf7d0;
        }

        label {
            font-weight: 500;
            color: #065f46;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">⚡ Electricity Bill Extractor</h2>

    <div class="card p-4 shadow-lg">

        <div class="mb-3">
            <label class="form-label">Upload Bill(s)</label>
            <input type="file" class="form-control" id="files" multiple>
        </div>

        <div class="mb-3">
            <label class="form-label">OR Enter Folder Path</label>
            <input type="text" class="form-control" id="folderPath" placeholder="C:\Users\...\bills">
        </div>

        <button class="btn btn-primary w-100" onclick="upload()">Extract Data</button>

    </div>

    <div class="mt-4">
        <h5 style="color:#047857;">Results:</h5>
        <pre id="resultBox" class="p-3 shadow" style="min-height:150px;"></pre>
    </div>

</div>

<script>
async function upload() {
    const filesInput = document.getElementById("files");
    const folderPath = document.getElementById("folderPath").value;
    const resultBox = document.getElementById("resultBox");

    resultBox.innerText = "Processing... ⏳";

    let formData = new FormData();

    if (filesInput.files.length > 0) {
        for (let i = 0; i < filesInput.files.length; i++) {
            formData.append("files", filesInput.files[i]);
        }
    }

    if (folderPath) {
        formData.append("folder_path", folderPath);
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/extract-bill", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        resultBox.innerText = JSON.stringify(data, null, 2);

    } catch (error) {
        resultBox.innerText = "Error: " + error;
    }
}
</script>

</body>
</html>
